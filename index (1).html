<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uzyt Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0B1E; color: #C8C6E0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }
    .logo { font-size: 48px; font-weight: 900; color: #fff; letter-spacing: -2px; margin-bottom: 8px; }
    .logo span { color: #0ABFBC; }
    .sub { color: #7B79A0; font-size: 14px; margin-bottom: 48px; }
    .cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 400px; }
    .card { background: #13112A; border: 1px solid #2A2750; border-radius: 16px; padding: 20px 24px; text-decoration: none; display: flex; align-items: center; gap: 16px; }
    .card:hover { border-color: #0ABFBC; }
    .card-icon { font-size: 28px; }
    .card-title { color: #fff; font-size: 16px; font-weight: 700; }
    .card-sub { color: #7B79A0; font-size: 12px; margin-top: 2px; }
    .arrow { color: #7B79A0; margin-left: auto; font-size: 18px; }
    footer { color: #3D3B60; font-size: 11px; margin-top: 48px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">U<span>zyt</span></div>
  <div class="sub">operated by Rynos LLC — Legal Documents</div>
  <div class="cards">
    <a href="privacy.html" class="card">
      <div class="card-icon">🔒</div>
      <div><div class="card-title">Privacy Policy</div><div class="card-sub">How we collect and use your data</div></div>
      <div class="arrow">›</div>
    </a>
    <a href="terms.html" class="card">
      <div class="card-icon">📋</div>
      <div><div class="card-title">Terms of Service</div><div class="card-sub">Rules and agreements for using Uzyt</div></div>
      <div class="arrow">›</div>
    </a>
    <a href="ethics.html" class="card">
      <div class="card-icon">🤝</div>
      <div><div class="card-title">Code of Ethics</div><div class="card-sub">Community standards and values</div></div>
      <div class="arrow">›</div>
    </a>
  </div>
  <footer>© 2026 Rynos LLC. All rights reserved. Uzyt is a product of Rynos LLC.</footer>
</body>
</html>
